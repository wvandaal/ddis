# manifest.yaml — Single source of truth for DDIS v3.0 modular assembly
# Generated by monolith-to-module migration of ddis_final.md (3,089 lines)

ddis_version: "3.0"
spec_name: "DDIS: Decision-Driven Implementation Specification Standard"
tier_mode: "two-tier"  # < 30 invariants, single domain => two-tier per §0.13.7

context_budget:
  target_lines: 4000
  hard_ceiling_lines: 5000
  reasoning_reserve: 0.25

constitution:
  system: "constitution/system.md"
  # No domain constitutions in two-tier mode

modules:
  core-standard:
    file: "modules/core-standard.md"
    domain: core
    maintains:
      - INV-001
      - INV-002
      - INV-003
      - INV-004
      - INV-005
      - INV-006
      - INV-007
      - INV-008
      - INV-009
      - INV-010
      - INV-017
      - INV-018
      - INV-019
      - INV-020
    interfaces:
      - INV-011
      - INV-012
      - INV-013
      - INV-014
      - INV-015
      - INV-016
    implements:
      - ADR-001
      - ADR-002
      - ADR-003
      - ADR-004
      - ADR-005
      - ADR-008
      - ADR-009
      - ADR-010
      - ADR-011
    adjacent: [element-specifications, modularization, guidance-operations]
    deep_context: null
    negative_specs:
      - "Must NOT define invariants without violation scenarios"
      - "Must NOT create strawman ADRs with obviously inferior options"
      - "Must NOT define quality gates without concrete measurement procedures"

  element-specifications:
    file: "modules/element-specifications.md"
    domain: core
    maintains:
      - INV-020
    interfaces:
      - INV-001
      - INV-002
      - INV-003
      - INV-004
      - INV-005
      - INV-006
      - INV-007
      - INV-008
      - INV-009
      - INV-010
      - INV-017
      - INV-018
      - INV-019
    implements:
      - ADR-008
      - ADR-009
      - ADR-010
    adjacent: [core-standard, guidance-operations]
    deep_context: null
    negative_specs:
      - "Must NOT state design goals in terms of implementation technology"
      - "Must NOT write generic negative specs that apply to all subsystems"
      - "Must NOT write generic verification prompts without subsystem-specific checks"

  modularization:
    file: "modules/modularization.md"
    domain: modularization
    maintains:
      - INV-011
      - INV-012
      - INV-013
      - INV-014
      - INV-015
      - INV-016
    interfaces:
      - INV-001
      - INV-006
      - INV-008
      - INV-017
      - INV-018
    implements:
      - ADR-006
      - ADR-007
    adjacent: [core-standard]
    deep_context: null
    negative_specs:
      - "Must NOT allow direct cross-module references bypassing the constitution"
      - "Must NOT allow bundles exceeding the hard ceiling"
      - "Must NOT allow invariants to be unowned or multiply-owned"

  guidance-operations:
    file: "modules/guidance-operations.md"
    domain: guidance
    maintains: []
    interfaces:
      - INV-001
      - INV-003
      - INV-006
      - INV-009
      - INV-017
      - INV-018
      - INV-019
      - INV-020
    implements:
      - ADR-004
      - ADR-005
      - ADR-011
    adjacent: [core-standard, element-specifications]
    deep_context: null
    negative_specs:
      - "Must NOT let voice shift between sections"
      - "Must NOT hedge in invariants, ADRs, or negative specifications"
      - "Must NOT use implicit references like 'see above'"
      - "Must NOT treat anti-patterns as substitute for negative specifications"

invariant_registry:
  INV-001: { owner: system, domain: core, description: "Causal Traceability — every implementation section traces to an ADR or invariant" }
  INV-002: { owner: system, domain: core, description: "Decision Completeness — every design choice with alternatives is captured in an ADR" }
  INV-003: { owner: system, domain: core, description: "Invariant Falsifiability — every invariant can be violated and detected" }
  INV-004: { owner: system, domain: core, description: "Algorithm Completeness — pseudocode, complexity, example, edge cases" }
  INV-005: { owner: system, domain: core, description: "Performance Verifiability — claims tied to benchmark and design point" }
  INV-006: { owner: system, domain: core, description: "Cross-Reference Density — no section is an island" }
  INV-007: { owner: system, domain: core, description: "Signal-to-Noise Ratio — every section earns its place" }
  INV-008: { owner: system, domain: core, description: "Self-Containment — spec sufficient for correct v1" }
  INV-009: { owner: system, domain: core, description: "Glossary Coverage — every domain-specific term defined" }
  INV-010: { owner: system, domain: core, description: "State Machine Completeness — all states, transitions, guards, invalid policies" }
  INV-011: { owner: system, domain: modularization, description: "Module Completeness — bundle sufficient without other modules [Conditional]" }
  INV-012: { owner: system, domain: modularization, description: "Cross-Module Isolation — references through constitution only [Conditional]" }
  INV-013: { owner: system, domain: modularization, description: "Invariant Ownership Uniqueness — each invariant maintained by exactly one module [Conditional]" }
  INV-014: { owner: system, domain: modularization, description: "Bundle Budget Compliance — bundles fit within hard ceiling [Conditional]" }
  INV-015: { owner: system, domain: modularization, description: "Declaration-Definition Consistency — declarations faithful to definitions [Conditional]" }
  INV-016: { owner: system, domain: modularization, description: "Manifest-Spec Synchronization — manifest reflects current file state [Conditional]" }
  INV-017: { owner: system, domain: core, description: "Negative Specification Coverage — explicit DO NOT constraints per chapter" }
  INV-018: { owner: system, domain: core, description: "Structural Redundancy at Point of Use — invariants restated, not just referenced" }
  INV-019: { owner: system, domain: core, description: "Implementation Ordering Explicitness — explicit dependency chain as DAG" }
  INV-020: { owner: system, domain: core, description: "Verification Prompt Coverage — structured self-check per element spec chapter" }
