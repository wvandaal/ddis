ddis_version: "3.0"
spec_name: "Multi-namespace Basic"
tier_mode: "two-tier"

context_budget:
  target_lines: 4000
  hard_ceiling_lines: 5000
  reasoning_reserve: 0.25

constitution:
  system: "constitution/system.md"

namespaces:
  CMP:
    constitution: "constitution/cmp-system.md"
    description: "Companion namespace exercising multi-namespace cross-refs"

modules:
  main:
    file: "modules/main.md"
    domain: main
    maintains:
      - APP-INV-001
    interfaces: []
    implements:
      - APP-ADR-001
    adjacent: []
    deep_context: null
    negative_specs: []

invariant_registry:
  APP-INV-001: { owner: main, domain: main, description: "App-side invariant referencing CMP" }
